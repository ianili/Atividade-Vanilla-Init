<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Atividade VanillaTilt - Inova Tech</title>
</head>
<body>
    <nav class="menu-nav">
        <ul>
            <li><a href="#sobre">Sobre Nós</a></li>
            <li><a href="#produtos">Produtos</a></li>
            <li><a href="#contato">Contato</a></li>
        </ul>
    </nav>

    <main>
        <section class="secaoCarrosel">
            <div class="box-texto">
                <div>
                    <h2>Inova Tech</h2>
                    <p>Uma marca de roupas urbanas com tecidos tecnológicos.</p>
                </div>
            </div>
            <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-indicators">
                    <button 
                        type="button" 
                        data-bs-target="#carouselExampleIndicators" 
                        data-bs-slide-to="0" 
                        class="active" 
                        aria-current="true" 
                        aria-label="Slide 1">
                    </button>
                    <button 
                        type="button" 
                        data-bs-target="#carouselExampleIndicators" 
                        data-bs-slide-to="1" 
                        aria-label="Slide 2">
                    </button>
                    <button 
                        type="button" 
                        data-bs-target="#carouselExampleIndicators" 
                        data-bs-slide-to="2" 
                        aria-label="Slide 3">
                    </button>
                    <button 
                        type="button" 
                        data-bs-target="#carouselExampleIndicators" 
                        data-bs-slide-to="3" 
                        aria-label="Slide 4">
                    </button>
                </div>

                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img 
                            src="img/3Q1Dd.jpg" 
                            class="d-block w-100" 
                            alt="...">
                    </div>
                    <div class="carousel-item">
                        <img 
                            src="img/can-neon-lights-be-outside-2.webp" 
                            class="d-block w-100" 
                            alt="...">
                    </div>
                    <div class="carousel-item">
                        <img 
                            src="img/IbO8A.jpg" 
                            class="d-block w-100" 
                            alt="...">
                    </div>
                    <div class="carousel-item">
                        <img 
                            src="img/water-outdoor-light-road-street-night-106620-pxhere.com.jpg" 
                            class="d-block w-100" 
                            alt="...">
                    </div>
                </div>

                <button 
                    class="carousel-control-prev" 
                    type="button" 
                    data-bs-target="#carouselExampleIndicators" 
                    data-bs-slide="prev">
                        <span 
                            class="carousel-control-prev-icon" 
                            aria-hidden="true"></span>
                        <span 
                            class="visually-hidden">Previous</span>
                </button>

                <button 
                    class="carousel-control-next" 
                    type="button" 
                    data-bs-target="#carouselExampleIndicators" 
                    data-bs-slide="next">
                        <span 
                            class="carousel-control-next-icon" 
                            aria-hidden="true"></span>
                        <span 
                            class="visually-hidden">Next</span>
                </button>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
